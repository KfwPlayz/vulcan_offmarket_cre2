name: Daily Vulcan7 Off-Market Job

on:
  schedule:
    - cron: "0 13 * * *"   # 9:00 AM ET during DST (UTC-4)
    - cron: "0 14 * * *"   # 9:00 AM ET during Standard Time (UTC-5)
  workflow_dispatch:
    inputs:
      force:
        description: "Run even if today's lock exists"
        required: false
        type: boolean
        default: false

permissions:
  contents: read
  actions: write

# Prevent overlapping runs (manual or delayed) from executing at the same time
concurrency:
  group: v7-daily-${{ github.ref }}
  cancel-in-progress: true

jobs:
  run:
    runs-on: ubuntu-latest
    env:
      EMAIL: ${{ secrets.EMAIL }}
      PASSWORD: ${{ secrets.PASSWORD }}
      WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
      PUPPETEER_SKIP_DOWNLOAD: "true"

    steps:
      # 0) Exit unless it's exactly 09:00 in New York
      - name: Gate to exactly 9:00 AM ET
        run: |
          NOW_ET=$(TZ=America/New_York date +'%H:%M')
          echo "Now ET: $NOW_ET"
          if [ "$NOW_ET" != "09:00" ]; then
            echo "Not 09:00 ET — exiting."
            exit 0
          fi

      # 1) Compute today's ET date (for locks & same-day dedupe)
      - name: Compute ET date
        id: date
        run: echo "DATE_ET=$(TZ=America/New_York date +%Y-%m-%d)" >> $GITHUB_OUTPUT

      # 2) Acquire a per-day lock (first 9am run wins)
      - name: Acquire daily lock
        id: lock
        uses: actions/cache@v4
        with:
          path: .daily-lock
          key: daily-lock-${{ steps.date.outputs.DATE_ET }}

      # 3) Exit if we've already run today (unless manual 'force' is true)
      - name: Exit if already ran today
        if: steps.lock.outputs.cache-hit == 'true' && !(github.event_name == 'workflow_dispatch' && github.event.inputs.force == 'true')
        run: |
          echo "Already ran on ${{ steps.date.outputs.DATE_ET }} ET — skipping."
          exit 0

      # 4) Proceed with the job
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install deps
        run: npm install --no-audit --no-fund

      # Same-day dedupe cache (ET date–scoped)
      - name: Restore dedupe cache (today only)
        id: dedupe_cache
        uses: actions/cache@v4
        with:
          path: sent-leads-cache-offmarket.json
          key: offmarket-cache-${{ steps.date.outputs.DATE_ET }}

      - name: Install Chromium
        run: |
          sudo apt-get update
          sudo apt-get install -y chromium-browser || sudo apt-get install -y chromium
          if command -v chromium-browser >/dev/null 2>&1; then
            echo "PUPPETEER_EXECUTABLE_PATH=$(command -v chromium-browser)" >> $GITHUB_ENV
          elif command -v chromium >/dev/null 2>&1; then
            echo "PUPPETEER_EXECUTABLE_PATH=$(command -v chromium)" >> $GITHUB_ENV
          fi

      - name: Show repo tree (one-time debug; you can delete later)
        run: ls -la

      - name: Run script
        run: node vulcan7_offmarket_script.js

      # Save the daily lock so any later trigger won't run
      - name: Save daily lock
        if: steps.lock.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: .daily-lock
          key: daily-lock-${{ steps.date.outputs.DATE_ET }}

      # Save today's dedupe cache (only if not already present)
      - name: Save dedupe cache (today)
        if: steps.dedupe_cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: sent-leads-cache-offmarket.json
          key: offmarket-cache-${{ steps.date.outputs.DATE_ET }}

      - name: Upload all screenshots (optional)
        uses: actions/upload-artifact@v4
        with:
          name: all-screenshots
          path: |
            *.png
          if-no-files-found: ignore
